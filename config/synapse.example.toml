[vault]
root = "~/notes"
include = ["**/*.md"]
exclude = [".obsidian/**", ".git/**", "__pycache__/**"]

[database]
path = "~/notes/.synapse.sqlite"

[vector_store]
type = "sqlite_vec"

[index]
provider = "default"
contextual_provider = "contextual"
min_chunk_chars = 700
max_chunk_chars = 1400
target_chunk_tokens = 256
max_chunk_tokens = 400
chunk_overlap_chars = 120
chunk_strategy = "hybrid"

[search]
provider = "default"
limit = 5
mode = "research"
candidate_multiplier = 10
note_weight = 0.5
chunk_weight = 0.5

[cipher]
default_timeout_seconds = 45
explain_timeout_seconds = 45
chunking_timeout_seconds = 30
stub_review_timeout_seconds = 45

[knowledge]
# Optional compiled knowledge layer. Disabled by default — when disabled,
# every /knowledge/* and /ui/knowledge/* route returns HTTP 404 and no
# managed files are written. Override per-environment via SYNAPSE_KNOWLEDGE_ENABLED.
enabled = false
managed_root = "_compiled"
default_status = "draft"
generated_by = "synapse"
auto_compile_on_ingest = false

[providers.embeddings.default]
type = "infinity"
model = "perplexity-ai/pplx-embed-v1-0.6b"
base_url = "http://127.0.0.1:8081"
dimensions = 1024
encoding_format = "float"

[providers.embeddings.contextual]
type = "infinity"
model = "perplexity-ai/pplx-embed-context-v1-0.6b"
base_url = "http://127.0.0.1:8081"
dimensions = 1024
encoding_format = "float"
context_strategy = "infinity_batch"

[providers.embeddings.fallback]
type = "ollama"
model = "nomic-embed-text:v1.5"
base_url = "http://127.0.0.1:11434"
dimensions = 768
encoding_format = "float"

[providers.embeddings.ollama_pplx]
type = "ollama"
model = "argus-ai/pplx-embed-v1-0.6b:fp32"
base_url = "http://127.0.0.1:11434"
dimensions = 1024
encoding_format = "float"

[providers.embeddings.ollama_pplx_context]
type = "ollama"
model = "argus-ai/pplx-embed-context-v1-0.6b:fp32"
base_url = "http://127.0.0.1:11434"
dimensions = 1024
encoding_format = "float"
context_strategy = "enriched_fallback"
